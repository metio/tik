[default.extend-words]
# EDN is extensible data notation, not a typo of END
edn = "edn"
# clojure.core/juxt is a function, strat-* are stratification test names
juxt = "juxt"
strat = "strat"
# fpr is the conventional abbreviation for a key fingerprint
fpr = "fpr"

[files]
# content-addressed corpus stores: filenames and bodies are hashes/EDN,
# not prose
extend-exclude = ["corpus/*/tickets/**", "tickets/**", "flake.lock"]
